<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMWOLFOX — Encrypted Archive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;400&family=Playfair+Display:ital@0;1&display=swap" rel="stylesheet">
    <style>
        body { background-color: #080808; color: #e5e5e5; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .serif { font-family: 'Playfair Display', serif; }
        .glass { background: rgba(15, 15, 15, 0.7); backdrop-filter: blur(25px); border: 1px solid rgba(138, 26, 26, 0.2); }
        .hidden-section { display: none; opacity: 0; }
        .red-accent { color: #8a1a1a; }
        
        /* Box Typography */
        .post-content blockquote {
            border-left: 2px solid #8a1a1a;
            padding-left: 1.5rem;
            margin: 2.5rem 0;
            font-family: 'Playfair Display', serif;
            font-style: italic;
            color: #d1d1d1;
            font-size: 1.2rem;
        }
        .post-content p { margin-bottom: 1.8rem; line-height: 1.8; color: #a1a1a1; font-weight: 300; }
        
        /* Animations */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade { animation: fadeUp 1s forwards; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center">

    <div id="gate" class="glass p-12 rounded-[2.5rem] shadow-2xl max-w-sm w-full mx-4 text-center transition-all duration-1000">
        <div class="mb-8">
            <img src="amw-logo.png" alt="AMWOLFOX" onerror="this.src='https://via.placeholder.com/100/8a1a1a/ffffff?text=AMW'" class="w-24 mx-auto drop-shadow-[0_0_15px_rgba(138,26,26,0.6)]">
        </div>
        <h2 class="serif italic text-xl mb-8 tracking-[0.2em]">Private Protocol</h2>
        
        <input type="password" id="passInput" 
               class="w-full p-4 rounded-xl bg-white/5 border border-white/10 outline-none focus:border-red-900 text-center transition-all mb-4 text-white" 
               placeholder="Enter Key"
               onkeypress="if(event.key === 'Enter') unlock()">
        
        <button onclick="unlock()" class="w-full py-3 bg-[#8a1a1a] hover:bg-red-700 text-white rounded-xl tracking-[0.3em] text-[10px] uppercase transition-all duration-500 shadow-lg shadow-red-900/20">
            Decrypt Archive
        </button>
        <p id="error" class="text-red-600 text-xs mt-5 hidden font-medium">Signature Mismatch. Access Denied.</p>
    </div>

    <div id="main-ui" class="hidden-section w-full max-w-6xl px-6 py-20 mx-auto">
        <header class="text-center mb-32">
            <div class="flex flex-col items-center justify-center">
                <div class="flex items-center justify-center gap-8 mb-6">
                    <img src="amw-logo.png" alt="AMW" class="w-16 md:w-20 h-auto drop-shadow-[0_0_10px_rgba(138,26,26,0.8)]">
                </div>
                <p class="tracking-[0.6em] text-[10px] text-zinc-500 uppercase">AMWOLFOX Archive Protocol</p>
                <div class="w-16 h-px bg-red-900/50 mt-8"></div>
            </div>
        </header>

        <div id="grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">
            </div>
    </div>

    <div id="modal" class="fixed inset-0 bg-[#050505] z-50 hidden overflow-y-auto">
        <div class="max-w-3xl mx-auto px-6 py-24">
            <button onclick="closePost()" class="group text-zinc-500 hover:text-white mb-16 flex items-center gap-3 transition-all">
                <span class="text-2xl group-hover:-translate-x-2 transition-transform">←</span> 
                <span class="text-[10px] uppercase tracking-[0.3em]">Return to Flux</span>
            </button>
            <span id="m-date" class="text-red-800 text-[10px] tracking-[0.4em] uppercase block mb-4 font-bold"></span>
            <h1 id="m-title" class="text-4xl md:text-6xl serif mb-12 leading-tight"></h1>
            <div id="m-content" class="post-content animate-fade"></div>
        </div>
    </div>

    <script>
        // THIS HASH CODE IS KEPT INTENTIONALLY. 
        // IF YOU ARE READING THIS, YOU HAVE ALREADY DECRYPTED THE ARCHIVE. 
        // THE KEY IS NOT HERE. THE KEY IS IN YOUR MIND. 
        // THE KEY IS IN THE FREQUENCY. 
        // THE KEY IS IN THE CALM. 
        // THE KEY IS IN THE SKY.
        // THE KEY IS IN THE UNIVERSE.
        const EXPECTED_HASH = "9140e28aacb9ba8c476600c9125cec2b0f14ff16222f5b823a05bda7ce61e4fa";

        async function unlock() {
            const input = document.getElementById('passInput').value;
            const error = document.getElementById('error');

            // Encryption Process
            const msgBuffer = new TextEncoder().encode(input);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');

            if (hashHex === EXPECTED_HASH) {
                const gate = document.getElementById('gate');
                gate.style.opacity = '0';
                gate.style.transform = 'translateY(-20px)';
                
                setTimeout(() => {
                    gate.style.display = 'none';
                    document.body.classList.remove('flex', 'items-center', 'justify-center');
                    const main = document.getElementById('main-ui');
                    main.style.display = 'block';
                    render();
                    setTimeout(() => main.classList.add('animate-fade'), 50);
                }, 800);
            } else {
                error.classList.remove('hidden');
                document.getElementById('gate').animate([
                    { transform: 'translateX(0px)' },
                    { transform: 'translateX(-10px)' },
                    { transform: 'translateX(10px)' },
                    { transform: 'translateX(0px)' }
                ], { duration: 200 });
            }
        }

        const blogEntries = Array.from({length: 10}).map((_, i) => ({
            id: i,
            date: `PROTOCOL 0${10-i}.26`,
            title: ["Midnight Protocols", "The Weight of Red", "Void Aesthetics", "Static in the Mind", "Digital Ghosting", "Neural Dust", "Subterranean Echoes", "Carbon & Silicon", "The Last Server", "Binary Solitude"][i],
            file: `posts/post-${i}.html`
        }));

        function render() {
            const grid = document.getElementById('grid');
            blogEntries.forEach(p => {
                grid.innerHTML += `
                    <div onclick="showPost(${p.id})" class="glass p-10 rounded-[2.5rem] cursor-pointer border-white/5 hover:border-red-900/50 transition-all duration-700 group">
                        <span class="text-[10px] text-red-900 tracking-[0.3em] font-bold uppercase">${p.date}</span>
                        <h3 class="serif text-2xl mt-6 group-hover:text-red-700 transition-colors duration-500">${p.title}</h3>
                        <div class="w-8 h-px bg-zinc-800 mt-6 group-hover:w-16 group-hover:bg-red-900 transition-all duration-700"></div>
                        <p class="text-zinc-500 text-xs mt-6 line-clamp-2 leading-relaxed uppercase tracking-widest font-light">Decrypting internal data stream...</p>
                    </div>
                `;
            });
        }

        async function showPost(id) {
            const p = blogEntries.find(x => x.id === id);
            document.getElementById('m-title').innerText = p.title;
            document.getElementById('m-date').innerText = p.date;
            try {
                const res = await fetch(p.file);
                if (!res.ok) throw new Error('Failed to load post');
                const html = await res.text();
                document.getElementById('m-content').innerHTML = html;
            } catch (e) {
                console.error('Error loading post:', e);
                document.getElementById('m-content').innerHTML = `<p class="text-red-500">Unable to load post content.</p>`;
            }
            document.getElementById('modal').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function closePost() {
            document.getElementById('modal').classList.add('hidden');
            document.body.style.overflow = 'auto';
        }
    </script>
</body>
</html>
